<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <form class="login-form register-form" autocomplete="off">
    <h2>Criar Nova Conta</h2>
    <div class="inputGroup">
      <label for="fullName">Nome Completo</label>
      <input type="text" id="fullName" class="fullName" maxlength="100" placeholder="Seu nome completo" />
    </div>
    <div class="inputGroup">
      <label for="email">E-mail</label>
      <input type="email" id="email" class="email" maxlength="256" placeholder="email@domain.com" />
    </div>
    <div class="inputGroup">
      <label for="location">Localidade</label>
      <input type="text" id="location" class="location" maxlength="100" placeholder="Cidade, Estado" />
    </div>
    <div class="inputGroup">
      <label for="password">Senha</label>
      <input type="password" id="password" class="password" placeholder="Sua senha" />
    </div>
    <div class="buttonRow">
      <button id="register" type="button">Criar Conta</button>
      <button id="back" type="button" class="secondary">Voltar</button>
    </div>
    <p id="message" class="message">Preencha todos os campos para criar sua conta.</p>
  </form>
  <script src="register.js" defer></script>
</body>
</html>
