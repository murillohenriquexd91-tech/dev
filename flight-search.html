<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta de Passagens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="flight-search-container">
    <h1>Consulta de Passagens Aéreas</h1>
    <form id="flightForm" class="flight-form">
      <div class="form-group">
        <label for="origin">Origem</label>
        <input type="text" id="origin" placeholder="Ex: São Paulo (GRU)" required />
      </div>
      <div class="form-group">
        <label for="destination">Destino</label>
        <input type="text" id="destination" placeholder="Ex: Rio de Janeiro (GIG)" required />
      </div>
      <div class="form-group">
        <label for="departureDate">Data de Ida</label>
        <input type="date" id="departureDate" required />
      </div>
      <div class="form-group">
        <label for="returnDate">Data de Volta</label>
        <input type="date" id="returnDate" />
      </div>
      <div class="form-group">
        <label for="passengers">Quantidade de Pessoas</label>
        <input type="number" id="passengers" min="1" max="9" value="1" required />
      </div>
      <button type="submit" class="search-btn">Buscar Passagens</button>
    </form>
    <div id="results" class="results" style="display: none;">
      <h2>Resultados da Busca</h2>
      <div id="flightsList"></div>
    </div>
    <button onclick="window.location.href='apps.html'" class="back-btn">Voltar aos Aplicativos</button>
  </div>
  <script src="flight-search.js"></script>
</body>
</html>
